<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>
    {% if page.title %}
      {{ page.title }} | {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  <meta name="description"
        content="{{ page.description | default: site.description | strip_html | normalize_whitespace }}">

  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <meta name="robots" content="index, follow">

  <!-- Social previews: LinkedIn, WhatsApp, etc. -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:title"
        content="{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description"
        content="{{ page.description | default: site.description | strip_html | normalize_whitespace }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">

  {% if page.image %}
  <meta property="og:image" content="{{ page.image | absolute_url }}">
  {% endif %}

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title"
        content="{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}">
  <meta name="twitter:description"
        content="{{ page.description | default: site.description | strip_html | normalize_whitespace }}">

  {% if page.image %}
  <meta name="twitter:image" content="{{ page.image | absolute_url }}">
  {% endif %}

  {% if page.url == "/" %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ProfilePage",
    "mainEntity": {
      "@type": "Person",
      "name": "Duvier Suárez Fontanella",
      "alternateName": [
        "Duvier Suarez Fontanella",
        "D. Suárez-Fontanella"
      ],
      "url": "https://duviersuarezfontanella.es/",
      "image": "https://duviersuarezfontanella.es/assets/images/profile/duvier.png",
      "jobTitle": "Theoretical and Computational Astrophysicist",
      "affiliation": {
        "@type": "Organization",
        "name": "University of Salamanca"
      },
      "knowsAbout": [
        "Theoretical Astrophysics",
        "Computational Astrophysics",
        "Axion Electrodynamics",
        "Neutron Stars",
        "Gravitational Waves",
        "Dark Matter",
        "Numerical Relativity",
        "Scientific Computing"
      ]
    }
  }
  </script>
  {% endif %}

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>

<body>
  <div class="page">
    {% include header.html %}

    <main>
      {{ content }}
    </main>

    {% include footer.html %}
  </div>

  <!-- Cloudflare Web Analytics -->
  <script defer
          src="https://static.cloudflareinsights.com/beacon.min.js"
          data-cf-beacon='{"token": "6d6d2c579b8c43da91714554b029fb3a"}'>
  </script>
</body>
</html>
